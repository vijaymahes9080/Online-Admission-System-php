<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <title>Registration Confirmation</title>
        <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
        <link rel="stylesheet" href="bootstrap/bootstrap-theme.min.css">
        <script src="bootstrap/jquery.min.js"></script>
        <script src="bootstrap/bootstrap.min.js"></script>
        <link type="text/css" rel="stylesheet" href="css/sign.css"></link>
    </head>
    <body style="background-image:url('./images/inbg.jpg');">
        <div class="container-fluid">    
            <div class="row">
                <div class="col-sm-12">
                    <img src="images/cutm.jpg" width="100%" style="box-shadow: 1px 5px 14px #999999;"></img>
                </div>
            </div>    
        </div>
        <div class="container" style="margin-top: 50px;">
            <div class="panel panel-success" style="width: 600px; margin: 0 auto; box-shadow: 0px 5px 15px #888;">
                <div class="panel-heading">
                    <h3 class="panel-title" style="font-family: Verdana; font-weight: bold; font-size: 20px;">Registration Successful!</h3>
                </div>
                <div class="panel-body" style="font-family: Verdana; font-size: 16px; line-height: 1.8;">
                    <p>Dear <strong id="userName">Student</strong>,</p>
                    <p>Your details have been successfully registered. Please note down your login credentials below to access your account:</p>
                    
                    <div style="background: #f4faf4; border: 1px solid #d6e9c6; border-radius: 4px; padding: 15px; margin: 20px 0; text-align: center;">
                        <div style="font-size: 18px; margin-bottom: 8px;"><strong>Student ID (User ID):</strong> <span id="userId" style="color: #3c763d; font-family: monospace; font-size: 22px; font-weight: bold;"></span></div>
                        <div style="font-size: 18px;"><strong>Password:</strong> <span id="userPass" style="color: #3c763d; font-family: monospace; font-size: 22px; font-weight: bold;"></span></div>
                    </div>

                    <p>You can now proceed to login to fill out the admission form and upload your documents.</p>
                    <hr>
                    <div style="text-align: center;">
                        <a href="index.html" class="btn btn-primary btn-lg" style="width: 200px;">Go to Login</a>
                    </div>
                </div>
            </div>
        </div>

        <script>
            window.onload = function() {
                const userId = sessionStorage.getItem('reg_user_id');
                const userPass = sessionStorage.getItem('reg_password');
                const userName = sessionStorage.getItem('reg_name');

                if (userId && userPass) {
                    document.getElementById('userId').innerText = userId;
                    document.getElementById('userPass').innerText = userPass;
                    document.getElementById('userName').innerText = userName || 'Student';
                } else {
                    // Fallback to sample info if loaded directly
                    document.getElementById('userId').innerText = 'CUTM00007';
                    document.getElementById('userPass').innerText = 'CmjAQZGw';
                }
            };
        </script>
    </body>
</html>
