<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <title>CUEE Admit Card</title>
        <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
        <link rel="stylesheet" href="bootstrap/bootstrap-theme.min.css">
        <script src="bootstrap/jquery.min.js"></script>
        <script src="bootstrap/bootstrap.min.js"></script>
        <link type="text/css" rel="stylesheet" href="css/admform.css"></link>
        <script src="mock-db.js"></script>
        <script type="text/javascript">
            function printpage() {
                var printButton = document.getElementById("print");
                var backButton = document.getElementById("back");
                printButton.style.visibility = 'hidden';
                backButton.style.visibility = 'hidden';
                window.print();
                printButton.style.visibility = 'visible';
                backButton.style.visibility = 'visible';
            }
        </script>
        <style>
            @media print {
                body {
                    background: none;
                }
                .container {
                    box-shadow: none;
                    margin: 0;
                    padding: 0;
                }
            }
        </style>
    </head>
    <body style="background-color: #f7f7f7;">
        <div class="container" style="background: white; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-top: 20px; margin-bottom: 20px; max-width: 800px;">
            <table class="table table-bordered" style="font-family: Verdana">
                <tr>
                    <td style="width:15%; text-align: center; vertical-align: middle;">
                        <img src="./images/Logo-T.gif" width="70px">
                    </td>
                    <td style="width:65%;">
                        <center>
                            <font style="font-family:Arial Black; font-size:18px; font-weight: bold; color: #1a4a75;">
                                CENTURION UNIVERSITY OF TECHNOLOGY AND MANAGEMENT
                            </font><br>
                            <font style="font-family:Verdana; font-size:11px; color: #555;">
                                BHUBANESWAR - 752050, ODISHA<br>
                                Phone : (0674)2492496, Fax : (0674)2490480
                            </font>
                        </center>
                        <br>
                        <center>
                            <font style="font-family:Arial Black; font-size:16px; font-weight: bold; color: #337ab7;">
                                CUEE ADMIT CARD (2026-27)
                            </font>
                        </center>
                    </td>
                    <td style="width:20%; text-align: center; vertical-align: middle;">
                        <img id="studentPic" src="images/loginuser.png" class="img-thumbnail" style="width: 120px; height: 120px; object-fit: cover;">
                    </td>
                </tr>       
                
                <tr>
                    <td><font style="font-family: Verdana;">Date</font></td>
                    <td colspan="2"><font style="font-family: Verdana; font-weight: bold">17th May 2026, Afternoon Session</font></td>
                </tr>
                <tr>
                    <td><font style="font-family: Verdana;">Time</font></td>
                    <td colspan="2"><font style="font-family: Verdana; font-weight: bold">2:00 PM - 4:00 PM</font></td>
                </tr>
                <tr>
                    <td><font style="font-family: Verdana;">Registration No.</font></td>
                    <td colspan="2"><font style="font-family: Verdana; font-weight: bold" id="lblRegNo"></font></td>
                </tr>
                <tr>
                    <td><font style="font-family: Verdana;">Name</font></td>
                    <td colspan="2"><font style="font-family: Verdana; font-weight: bold" id="lblName"></font></td>
                </tr>
                <tr>
                    <td><font style="font-family: Verdana;">Gender</font></td>
                    <td colspan="2" id="lblGender"></td>
                </tr>
                <tr>
                    <td><font style="font-family: Verdana;">Address</font></td>
                    <td colspan="2" id="lblAddr"></td>
                </tr>
                <tr>
                    <td><font style="font-family: Verdana;">Mobile</font></td>
                    <td colspan="2" id="lblMob"></td>
                </tr>
                <tr>
                    <td><font style="font-family: Verdana;">Exam Center</font></td>
                    <td colspan="2"><font style="font-family: Verdana; font-weight: bold" id="lblCenter"></font></td>
                </tr>
                <tr>
                    <td><font style="font-family: Verdana;">Signature</font></td>
                    <td colspan="2" style="height: 60px; vertical-align: bottom;">
                        <img src="images/Signature.png" style="height: 40px; margin-bottom: 5px;">
                    </td>
                </tr>
            </table>
            
            <div class="row text-center" style="margin-top: 20px;">
                <input type="button" id="print" class="btn btn-primary" value="Print Admit Card" onclick="printpage();" style="width: 150px; margin-right: 15px;">
                <a href="homepageuser.html" id="back" class="btn btn-default" style="width: 150px;">Back to Profile</a>
            </div>
        </div>

        <script>
            window.onload = function() {
                const currentUser = getCurrentUser();
                if (!currentUser) {
                    window.location.href = 'index.html';
                    return;
                }
                const app = getApplication(currentUser.s_id);
                if (!app || app.s_status !== 'Approved') {
                    alert("Admit Card not available.");
                    window.location.href = 'homepageuser.html';
                    return;
                }

                document.getElementById('lblRegNo').innerText = app.s_id;
                document.getElementById('lblName').innerText = currentUser.s_name;
                document.getElementById('lblGender').innerText = app.s_sex || 'N/A';
                document.getElementById('lblAddr').innerText = app.s_cadr || 'N/A';
                document.getElementById('lblMob').innerText = app.s_phn1 || 'N/A';
                document.getElementById('lblCenter').innerText = app.s_center || 'Bhubaneswar Campus';
            };
        </script>
    </body>
</html>
