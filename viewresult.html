<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <title>View Exam Result</title>
        <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
        <link rel="stylesheet" href="bootstrap/bootstrap-theme.min.css">
        <script src="bootstrap/jquery.min.js"></script>
        <script src="bootstrap/bootstrap.min.js"></script>
        <link type="text/css" rel="stylesheet" href="css/admform.css"></link>
        <script src="mock-db.js"></script>
    </head>
    <body style="background-image:url('./images/inbg.jpg');">
        <div class="container-fluid">    
            <div class="row">
                <div class="col-sm-12">
                    <img src="images/cutm.jpg" width="100%" style="box-shadow: 1px 5px 14px #999999;"></img>
                </div>
            </div>    
        </div><br>
         
        <div class="container">
            <center>
                <div class="jumbotron" style="width:50%; box-shadow: -3px 3px 10px #999999; margin-top:30px; background: rgba(255,255,255,0.9);">
                    <div class="row">
                        <div class="col-sm-12">  
                            <h2 style="font-family: Verdana; font-weight: bold; color: #337ab7; margin-bottom: 20px;">CUEE Result Details</h2>
                            <p style="font-size: 20px; font-family: Verdana; margin-bottom: 25px;">
                                Your Marks Obtained are: <strong id="lblMark" style="color: green; font-size: 28px;">0</strong>
                            </p>      
                            <a href="homepageuser.html" class="btn btn-default" style="width: 150px;">Back to Profile</a>
                        </div>
                    </div>
                </div>
            </center>
        </div>

        <script>
            window.onload = function() {
                const currentUser = getCurrentUser();
                if (!currentUser) {
                    window.location.href = 'index.html';
                    return;
                }
                const app = getApplication(currentUser.s_id);
                if (!app || app.s_mark === undefined) {
                    alert("Result not declared yet.");
                    window.location.href = 'homepageuser.html';
                    return;
                }

                document.getElementById('lblMark').innerText = app.s_mark;
            };
        </script>
    </body>
</html>
